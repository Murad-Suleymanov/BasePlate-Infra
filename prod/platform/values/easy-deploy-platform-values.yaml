name: easy-deploy-operator

istio:
  enabled: true

operator:
  containerName: manager
  image: ghcr.io/murad-suleymanov/easy-deploy-operator:f46491b64dd92667a5610f82f83dcf9a36eb4e90
  imagePullPolicy: Always
  replicas: 1
  imagePullSecrets:
    - ghcr-secret

  args:
    metricsBindAddress:
      enabled: true
      value: ":8080"
    healthProbeBindAddress:
      enabled: true
      value: ":8081"
  extraArgs: []

  env:
    environment:
      enabled: true
      value: prod
    baseDomain:
      enabled: true
      value: easysolution.work
    targetIP:
      enabled: true
      value: "116.203.203.121"
    registryURL:
      enabled: true
      value: registry.easysolution.work
    webhookURL:
      enabled: true
      value: "https://webhook.easysolution.work"
    # Prometheus for the SLO rollback gate: the operator queries per-version Istio error
    # rate / latency here to decide whether a new build tag is burning its error budget.
    # Same in-cluster address Kiali reads from.
    prometheusURL:
      enabled: true
      value: "http://monitoring-kube-prometheus-prometheus.monitoring:9090"
  extraEnv: []

  envFrom:
    githubPipelineSecret:
      enabled: true
      name: github-pipeline-secret
      optional: true
  extraEnvFrom: []

  ports:
    metrics:
      enabled: true
      containerPort: 8080
    health:
      enabled: true
      containerPort: 8081
    webhook:
      enabled: true
      containerPort: 9090
  extraPorts: []

  terminationGracePeriodSeconds: 30
  lifecycle:
    preStopSleepSeconds: 5

  probes:
    liveness:
      enabled: true
      path: /healthz
      port: health
    readiness:
      enabled: true
      path: /readyz
      port: health

webhook:
  enabled: true
  service:
    name: easy-deploy-webhook
    port: 9090
    targetPort: 9090
  route:
    name: webhook-route
    targetIP: "116.203.203.121"
    hostname: webhook.easysolution.work
    pathPrefix: /webhook
  gateway:
    name: main-gateway
    namespace: nginx-gateway
    sectionName: https

rbac:
  clusterRole:
    name: easy-deploy-operator
    rules:
      birservices:
        enabled: true
        apiGroups: ["deploy.easydeploy.io"]
        resources: ["birservices"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      birservicesStatus:
        enabled: true
        apiGroups: ["deploy.easydeploy.io"]
        resources: ["birservices/status"]
        verbs: ["get", "update", "patch"]
      pools:
        enabled: true
        apiGroups: ["deploy.easydeploy.io"]
        resources: ["pools"]
        verbs: ["get", "list", "watch"]
      prometheusrules:
        enabled: true
        apiGroups: ["monitoring.coreos.com"]
        resources: ["prometheusrules"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      deployments:
        enabled: true
        apiGroups: ["apps"]
        resources: ["deployments"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      hpa:
        enabled: true
        apiGroups: ["autoscaling"]
        resources: ["horizontalpodautoscalers"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      servicesSecrets:
        enabled: true
        apiGroups: [""]
        resources: ["services", "secrets"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      pods:
        enabled: true
        apiGroups: [""]
        resources: ["pods"]
        verbs: ["get", "list", "watch"]
      jobs:
        enabled: true
        apiGroups: ["batch"]
        resources: ["jobs"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      httproutes:
        enabled: true
        apiGroups: ["gateway.networking.k8s.io"]
        resources: ["httproutes"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      servicemonitors:
        enabled: true
        apiGroups: ["monitoring.coreos.com"]
        resources: ["servicemonitors"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      poddisruptionbudgets:
        enabled: true
        apiGroups: ["policy"]
        resources: ["poddisruptionbudgets"]
        verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    extraRules: []
  clusterRoleBinding:
    name: easy-deploy-operator
  argocdRole:
    name: easy-deploy-read-argocd-repos
    namespace: argocd
    rules:
      secrets:
        enabled: true
        apiGroups: [""]
        resources: ["secrets"]
        verbs: ["get", "list"]
    extraRules: []
  argocdRoleBinding:
    name: easy-deploy-read-argocd-repos

crd:
  name: birservices.deploy.easydeploy.io
  group: deploy.easydeploy.io
  scope: Namespaced
  names:
    plural: birservices
    singular: birservice
    kind: BirService
    shortNames:
      - bs
  version: v1alpha1
  additionalPrinterColumns:
    - name: Repo
      type: string
      jsonPath: .spec.repo
    - name: Image
      type: string
      jsonPath: .spec.image
    - name: Port
      type: integer
      jsonPath: .spec.port
    - name: Hostname
      type: string
      jsonPath: .spec.hostname
    - name: Available
      type: integer
      jsonPath: .status.availableReplicas
    - name: Build
      type: string
      jsonPath: .status.buildStatus
  specProperties:
    image:
      type: string
    repo:
      type: string
    tag:
      type: string
    imageTag:
      type: string
      description: "Rollback override — previous build SHA (e.g. abc1234)."
    dockerfile:
      type: string
    injectPipeline:
      type: boolean
      description: "When true, adds GitHub Actions build workflow to the repo. Requires GITHUB_TOKEN."
    replicas:
      type: integer
      format: int32
      minimum: 0
      description: "Ignored when spec.hpa.minReplicas/maxReplicas are set."
    hpa:
      type: object
      description: "HPA format."
      properties:
        minReplicas:
          type: integer
          format: int32
          minimum: 1
        maxReplicas:
          type: integer
          format: int32
          minimum: 1
        targetRPS:
          type: integer
          format: int32
          minimum: 1
          description: "Legacy RPS knob (equivalent to scaleType: rps). Prefer scaleType. Requires spec.traffic."
        scaleType:
          type: string
          enum: ["cpu", "memory", "rps", "worker"]
          description: "The single signal the HPA scales on. cpu/memory/worker = utilization %; rps = Istio requests/sec per pod (integer, needs spec.traffic). worker = worker-pool saturation % (needs spec.metrics). Omit to default to CPU 80%."
        target:
          type: integer
          format: int32
          minimum: 1
          description: "Per-pod target for scaleType. cpu/memory/worker: utilization % (defaults to 80). rps: requests/sec per pod (integer, required)."
        window:
          type: string
          pattern: "^([0-9]+(ms|s|m|h|d|w|y))+$"
          description: "Rate window for scaleType: rps (e.g. 1m, 2m, 5m). Operator creates the backing recording rule on demand. Default 1m. Ignored for cpu/memory/worker."
    resources:
      type: object
      description: "Container resource requests/limits."
      properties:
        requests:
          type: object
          properties:
            memory:
              type: string
            cpu:
              type: string
        limits:
          type: object
          properties:
            memory:
              type: string
            cpu:
              type: string
    nodePool:
      type: string
      description: "Node pool to schedule on (resolves to a Pool resource → nodeSelector + tolerations). Empty = default untainted nodes."
    port:
      type: integer
      format: int32
      minimum: 1
      maximum: 65535
    containerPort:
      type: integer
      format: int32
      minimum: 1
      maximum: 65535
    hostname:
      type: string
    expose:
      type: boolean
      description: "If false, no HTTPRoute/DNS (internal only). Default true."
    metrics:
      type: object
      properties:
        enabled:
          type: boolean
        path:
          type: string
          description: "Metrics HTTP path, default /metrics"
    canary:
      type: object
      description: "Canary deployment with weighted HTTPRoute traffic splitting."
      properties:
        enabled:
          type: boolean
        weight:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        image:
          type: string
        tag:
          type: string
    traffic:
      type: object
      description: "Service mesh traffic policies."
      properties:
        provider:
          type: string
        rateLimit:
          type: object
          properties:
            enabled:
              type: boolean
            mode:
              type: string
            local:
              type: object
              properties:
                requestsPerSecond:
                  type: integer
                  format: int32
                burst:
                  type: integer
                  format: int32
    tracing:
      type: object
      description: "OpenTelemetry distributed tracing. Operator detects runtime from Dockerfile/image and adds the matching OTel Operator inject-* annotation."
      properties:
        enabled:
          type: boolean
        runtime:
          type: string
          enum: ["auto", "java", "python", "nodejs", "dotnet", "go", "none"]
          description: "auto (default) detects from image; explicit values force a specific OTel agent; none disables annotation."
        samplingRatio:
          type: string
          description: "Head sampling ratio (e.g. \"0.1\" = 10%). Tail sampling on the OTel Collector overrides this when configured."
    shutdown:
      type: object
      description: "Graceful termination tuning. terminationGracePeriodSeconds = preStopSleepSeconds + drainBufferSeconds."
      properties:
        preStopSleepSeconds:
          type: integer
          format: int32
          minimum: 0
          maximum: 600
          description: "Seconds the container sleeps before SIGTERM (drains endpoints from kube-proxy/Istio xDS/Gateway). Default 15."
        drainBufferSeconds:
          type: integer
          format: int32
          minimum: 0
          maximum: 600
          description: "Post-SIGTERM budget for in-flight requests to finish before SIGKILL. Default 5. Increase for long requests (uploads, streaming)."
    strategy:
      type: object
      description: "Deployment update strategy. Defaults to RollingUpdate (maxUnavailable=0, maxSurge=25%)."
      properties:
        type:
          type: string
          enum: ["RollingUpdate", "Recreate"]
          description: "RollingUpdate (default) or Recreate (kill-all then start-all; required for stateful/singleton apps)."
        maxSurge:
          x-kubernetes-int-or-string: true
          description: "Max pods above desired during rolling update. Default 25%. Ignored for Recreate."
        maxUnavailable:
          x-kubernetes-int-or-string: true
          description: "Max pods unavailable during rolling update. Default 0. Ignored for Recreate."
  statusProperties:
    availableReplicas:
      type: integer
      format: int32
    buildImage:
      type: string
    buildStatus:
      type: string
    buildTag:
      type: string
    lastRebuild:
      type: string
    stableTag:
      type: string
    canaryImage:
      type: string

# Node pools. Adding a pool = add an entry here (no chart/ApplicationSet change).
# The nodes themselves must be labelled/tainted to match at join time, e.g.:
#   kubelet --node-labels=nodePool=system --register-with-taints=nodePool=system:NoSchedule
pools:
  # Default pool: untainted, no selector. Every workload with no spec.nodePool
  # lands here. Declared explicitly so it shows up in `kubectl get pools`.
  default:
    enabled: true
  # Our own platform / system components. Dedicated nodes: only workloads that
  # set `pool: system` schedule here (taint repels everything else; nodeSelector
  # pins system workloads onto these nodes).
  system:
    enabled: true
    nodeSelector:
      nodePool: system
    taints:
      - key: nodePool
        value: system
        effect: NoSchedule
