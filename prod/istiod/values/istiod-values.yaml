pilot:
  env:
    PILOT_ENABLE_AMBIENT: "true"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  traceSampling: 10.0

meshConfig:
  accessLogFile: /dev/stdout
  enableTracing: true
  extensionProviders:
    - name: zipkin
      zipkin:
        service: otel-collector-opentelemetry-collector.observability.svc.cluster.local
        port: 9411
