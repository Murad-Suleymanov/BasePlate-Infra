apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: easy-deploy-operator-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: easy-deploy-operator
spec:
  groups:
    - name: easy-deploy-operator.rules
      rules:
        - alert: EasyDeployOperatorDown
          expr: sum(up{job=~".*easy-deploy-operator.*"}) < 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Easy Deploy operator is down"
            description: "Prometheus cannot scrape easy-deploy-operator metrics target for 5m."
        - alert: EasyDeployReconcileErrorsHigh
          expr: sum(rate(easydeploy_reconcile_total{controller="birservice",result="error"}[10m])) > 0.1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "High BirService reconcile error rate"
            description: "Reconcile errors are above 0.1/sec for 10m."
        - alert: EasyDeployReconcileSlowP95
          expr: histogram_quantile(0.95, sum(rate(easydeploy_reconcile_duration_seconds_bucket{controller="birservice"}[10m])) by (le)) > 5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "BirService reconcile latency is high"
            description: "P95 reconcile duration is above 5 seconds for 10m."
        - alert: EasyDeployBuildFailuresDetected
          expr: sum(increase(easydeploy_build_status_total{status=~"failed|error"}[30m])) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Build failures detected by operator"
            description: "At least one build failed during the last 30 minutes."
