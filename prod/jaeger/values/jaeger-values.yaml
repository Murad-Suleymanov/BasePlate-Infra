replicas: 1

config:
  extensions:
    jaeger_storage:
      backends:
        memory_store:
          memory:
            max_traces: 100000
  service:
    extensions: [jaeger_storage]
    pipelines:
      traces:
        receivers: [otlp, jaeger]
        exporters: [jaeger_storage_exporter]

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
