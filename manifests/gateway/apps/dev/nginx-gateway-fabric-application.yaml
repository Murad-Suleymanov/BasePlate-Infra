apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gateway-fabric-dev
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: ghcr.io/nginx/charts
      chart: nginx-gateway-fabric
      targetRevision: 2.4.2
      helm:
        releaseName: ngf
        valueFiles:
          - $values/manifests/gateway/values/dev/nginx-gateway-fabric-values.yaml
    - repoURL: https://github.com/Murad-Suleymanov/BasePlate-Infra
      ref: values
      targetRevision: HEAD
  destination:
    name: dev-cluster
    namespace: nginx-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
