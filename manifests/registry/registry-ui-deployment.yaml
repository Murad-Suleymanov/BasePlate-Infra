apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-ui
  namespace: registry
  labels:
    app.kubernetes.io/name: registry-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry-ui
    spec:
      containers:
        - name: registry-ui
          image: joxit/docker-registry-ui:latest
          ports:
            - containerPort: 80
          env:
            # Brauzer eyni origin (HTTPS) istifadə edir; nginx internal registry-ə proxy edir
            - name: REGISTRY_URL
              value: "https://registry-ui.easysolution.work"
            - name: NGINX_PROXY_PASS_URL
              value: "http://registry.registry.svc.cluster.local:5000"
            - name: PULL_URL
              value: "https://registry.easysolution.work"
            - name: SINGLE_REGISTRY
              value: "true"
            - name: REGISTRY_TITLE
              value: "Easy Deploy Registry"
