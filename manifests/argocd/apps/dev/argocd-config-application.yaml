apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-config-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Murad-Suleymanov/BasePlate-Infra
    targetRevision: HEAD
    path: manifests/argocd/resources/dev
    directory:
      recurse: true
  destination:
    name: dev-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
