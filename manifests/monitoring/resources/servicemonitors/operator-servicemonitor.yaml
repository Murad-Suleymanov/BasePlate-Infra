# Easy-Deploy Operator metrikəri — Prometheus scrape
# Operator :8080/metrics expose edir (controller-runtime)
# PodMonitor: operator üçün Service yoxdur
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: easy-deploy-operator
  namespace: easy-deploy-system
  labels:
    app.kubernetes.io/name: easy-deploy-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: easy-deploy-operator
  namespaceSelector:
    matchNames: [easy-deploy-system]
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
