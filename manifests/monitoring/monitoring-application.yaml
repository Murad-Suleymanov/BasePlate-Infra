apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  sources:
    # Child apps: kube-prometheus-stack, metrics-server
    - repoURL: https://github.com/Murad-Suleymanov/BasePlate-Infra
      targetRevision: HEAD
      path: manifests/monitoring/apps
      directory:
        recurse: true
        include: '*-application.yaml'
    # Monitoring config resources: dashboards, routes, ServiceMonitor/PodMonitor
    - repoURL: https://github.com/Murad-Suleymanov/BasePlate-Infra
      targetRevision: HEAD
      path: manifests/monitoring
      directory:
        recurse: true
        exclude: '{apps/*,*-application.yaml,*-values.yaml}'
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
