# Easy Deploy Registry - Build & Push Pipeline
# Repoya əlavə et: .github/workflows/build-push.yaml kopyala
#
# GitHub repo Settings → Secrets əlavə et:
#   REGISTRY_URL      = registry.easysolution.work
#   REGISTRY_USERNAME = <registry user, məs: admin>
#   REGISTRY_PASSWORD = <registry password / token>
#
# Image adı: registry.easysolution.work/<REPO_NAME>:<tag>
# Məs: github.com/org/todo-api → registry.easysolution.work/todo-api:abc1234

name: Build & Push to Easy Deploy Registry

on:
  push:
    branches: [main, master]
  # pull_request üçün yalnız build, push etmə:
  # pull_request:
  #   branches: [main, master]

env:
  REGISTRY: registry.easysolution.work

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: vars
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          echo "image_name=${REPO_NAME,,}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Easy Deploy Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:latest
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
