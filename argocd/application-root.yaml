# App of Apps — infra app-ləri (argocd/ altında başlanğıc, özünü izləyir)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-infra
  namespace: argocd
spec:
  project: default
  sources:
    # Infra app-lər: gateway, monitoring, cert-manager, dns, registry, argocd-config
    - repoURL: https://github.com/Murad-Suleymanov/BasePlate-Infra
      targetRevision: HEAD
      path: manifests
      directory:
        recurse: true
        include: '*-application.yaml'
    # Özü: argocd/application-root.yaml
    - repoURL: https://github.com/Murad-Suleymanov/BasePlate-Infra
      targetRevision: HEAD
      path: argocd
      directory:
        recurse: true
        include: '*.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
