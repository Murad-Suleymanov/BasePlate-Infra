apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-platform
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/Murad-Suleymanov/BasePlate
      targetRevision: HEAD
      path: dev
      directory:
        recurse: true
        include: '*-application.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
