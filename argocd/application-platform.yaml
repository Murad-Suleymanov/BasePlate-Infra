apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: easy-deploy-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Murad-Suleymanov/BasePlate
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: easy-deploy-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
