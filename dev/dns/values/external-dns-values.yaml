provider:
  name: cloudflare
# Same zone as prod: isolate TXT ownership for dev cluster.
txtOwnerId: dev-cluster
txtPrefix: dev-
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: cloudflare_api_token
domainFilters:
  - easysolution.work
policy: upsert-only
sources:
  - gateway-httproute
extraArgs:
  - --gateway-namespace=nginx-gateway
serviceMonitor:
  enabled: true
