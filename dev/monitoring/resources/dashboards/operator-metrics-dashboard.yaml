apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-operator-metrics-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: easy-deploy-operator-dashboard
data:
  easy-deploy-operator-metrics.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "targets": [
            {
              "expr": "sum(rate(controller_runtime_reconcile_total{controller=\"birservice\"}[5m]))",
              "refId": "A"
            }
          ],
          "title": "Controller Reconcile Rate (common)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 2,
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(easydeploy_reconcile_duration_seconds_bucket{controller=\"birservice\"}[5m])) by (le))",
              "refId": "A"
            }
          ],
          "title": "Reconcile Duration P95 (custom)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 3,
          "targets": [
            {
              "expr": "sum(easydeploy_reconcile_inflight{controller=\"birservice\"})",
              "refId": "A"
            }
          ],
          "title": "In-flight Reconciles (custom)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "id": 4,
          "targets": [
            {
              "expr": "sum(rate(easydeploy_reconcile_total{controller=\"birservice\",result=\"error\"}[5m]))",
              "refId": "A"
            }
          ],
          "title": "Reconcile Errors / sec (custom)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "id": 5,
          "targets": [
            {
              "expr": "sum(increase(easydeploy_build_status_total{status=~\"failed|error\"}[30m]))",
              "refId": "A"
            }
          ],
          "title": "Failed Builds (30m, custom)",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["operator", "easy-deploy", "controller-runtime", "custom-metrics"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Easy Deploy Operator Metrics",
      "uid": "easy-deploy-operator-metrics",
      "version": 1,
      "weekStart": ""
    }
