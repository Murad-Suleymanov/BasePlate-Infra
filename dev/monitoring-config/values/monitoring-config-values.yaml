namespace: monitoring

gateway:
  name: main-gateway
  namespace: nginx-gateway

grafana:
  route:
    name: grafana-route
    sections: [http, https]
  backendService: monitoring-grafana
  backendPort: 80

operator:
  namespace: easy-deploy-system
  labelName: easy-deploy-operator

targetIP: "178.104.84.100"
grafanaHostname: grafana-dev.easysolution.work

scrapeInterval: 30s

alerts:
  enabled: true
  operatorDown:
    for: 5m
    severity: critical
  reconcileErrorsHigh:
    threshold: 0.1
    for: 10m
    severity: warning
  reconcileSlowP95:
    threshold: 5
    for: 10m
    severity: warning
  buildFailures:
    for: 5m
    severity: warning

extraAlertRules: []

dashboards:
  operatorMetrics:
    enabled: true
    refreshInterval: 30s
  birservice:
    enabled: true
    refreshInterval: 30s

extraDashboards: {}

serviceMonitors:
  operator:
    enabled: true
  calico:
    enabled: true
  istiod:
    enabled: true
  envoy:
    enabled: true
  kiali:
    enabled: true
  jaeger:
    enabled: true

extraServiceMonitors: []
