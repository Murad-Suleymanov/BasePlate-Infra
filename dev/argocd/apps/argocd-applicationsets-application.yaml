apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-applicationsets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Murad-Suleymanov/BasePlate-Infra
    targetRevision: HEAD
    path: dev/argocd/applicationsets
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

