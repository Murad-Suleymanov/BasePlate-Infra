tempo:
  extraArgs:
    - "-config.expand-env=true"
  extraEnv:
    - name: TEMPO_S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: minio-creds
          key: rootUser
    - name: TEMPO_S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: minio-creds
          key: rootPassword
  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo
        endpoint: minio.observability.svc.cluster.local:9000
        access_key: "${TEMPO_S3_ACCESS_KEY}"
        secret_key: "${TEMPO_S3_SECRET_KEY}"
        insecure: true
        forcepathstyle: true
  retention: 168h
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

persistence:
  enabled: false

serviceMonitor:
  enabled: true
