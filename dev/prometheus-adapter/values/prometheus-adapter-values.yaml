# prometheus-adapter — serves Prometheus queries through the Kubernetes
# custom/external metrics API so HorizontalPodAutoscalers can scale on mesh and
# app metrics. The BasePlate operator emits an HPA metric from a BirService's
# spec.hpa.scaleType: rps → External istio_requests_per_second, worker → Pods
# app_worker_utilization (both served here).
#
# Deployed into the `monitoring` namespace alongside kube-prometheus-stack.

# Point the adapter at the in-cluster Prometheus from kube-prometheus-stack
# (helm release "monitoring" -> service monitoring-kube-prometheus-prometheus).
prometheus:
  url: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local
  port: 9090
  path: ""

# Two replicas so the operator-driven config rollouts (below) have no metrics-API
# gap: maxUnavailable 0 keeps an old pod serving until a new one is Ready.
replicas: 2
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

# The entire rules config is owned and generated by the easy-deploy operator, not by
# this chart. rules.existing points the adapter at the operator-managed ConfigMap
# (monitoring/easy-deploy-adapter-config) so the chart renders no config of its own.
#
# The operator writes both the static worker custom rule (app_worker_utilization) and
# one external rule per rps rate window — istio_requests_per_second_<window> =
# sum(rate(istio_requests_total[<window>])) — computed live (no recording rule, no
# evaluation delay). A new window appears as a new rule and the operator rolls this
# Deployment via a config-checksum annotation; ArgoCD ignores that annotation
# (RespectIgnoreDifferences) so it doesn't fight the operator.
rules:
  existing: easy-deploy-adapter-config

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
