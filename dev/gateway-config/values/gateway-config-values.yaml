targetIP: "178.104.84.100"
baseDomain: easysolution.work
acmeEmail: admin@easysolution.work

gateway:
  name: main-gateway
  namespace: nginx-gateway
  className: nginx
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-tls
            namespace: nginx-gateway
  extraListeners: []

wildcard:
  name: wildcard-easysolution
  secretName: wildcard-tls

cloudflare:
  secretName: cloudflare-api-token
  secretKey: cloudflare_api_token

letsencrypt:
  accountKeySecret: letsencrypt-account-key
  staging:
    enabled: true
    accountKeySecret: letsencrypt-staging-account-key

extraCertificates: []

tracing:
  enabled: true
  strategy: ratio
  ratio: 100
  spanAttributes:
    - key: deployment.environment
      value: dev
  # Static (non-BirService) HTTPRoutes that need OTel tracing.
  # BirService routes get policies from the operator automatically.
  staticRoutes:
    - name: argocd-route
      namespace: argocd
    - name: webhook-route
      namespace: easy-deploy-system
    - name: kiali-route
      namespace: istio-system
    - name: grafana-route
      namespace: monitoring
    - name: minio-api-route
      namespace: observability
    - name: minio-console-route
      namespace: observability
    - name: registry-route
      namespace: registry
    - name: registry-ui-route
      namespace: registry
