{{- if .Values.tracing.enabled }}
{{- range .Values.tracing.staticRoutes }}
---
apiVersion: gateway.nginx.org/v1alpha2
kind: ObservabilityPolicy
metadata:
  name: {{ printf "%s-tracing" .name }}
  namespace: {{ .namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ .name }}
  tracing:
    strategy: {{ $.Values.tracing.strategy }}
{{- if eq $.Values.tracing.strategy "ratio" }}
    ratio: {{ $.Values.tracing.ratio }}
{{- end }}
{{- if $.Values.tracing.spanAttributes }}
    spanAttributes:
{{- toYaml $.Values.tracing.spanAttributes | nindent 6 }}
{{- end }}
{{- end }}
{{- end }}
