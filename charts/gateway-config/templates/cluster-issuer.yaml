apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.acmeEmail }}
    privateKeySecretRef:
      name: {{ .Values.letsencrypt.accountKeySecret }}
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: {{ .Values.cloudflare.secretName }}
              key: {{ .Values.cloudflare.secretKey }}
        selector:
          dnsZones:
            - {{ .Values.baseDomain | quote }}
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: {{ .Values.gateway.name }}
                namespace: {{ .Values.gateway.namespace }}
                kind: Gateway
{{- if .Values.letsencrypt.staging.enabled }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ .Values.acmeEmail }}
    privateKeySecretRef:
      name: {{ .Values.letsencrypt.staging.accountKeySecret }}
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: {{ .Values.cloudflare.secretName }}
              key: {{ .Values.cloudflare.secretKey }}
        selector:
          dnsZones:
            - {{ .Values.baseDomain | quote }}
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: {{ .Values.gateway.name }}
                namespace: {{ .Values.gateway.namespace }}
                kind: Gateway
{{- end }}
