apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
  annotations:
    external-dns.alpha.kubernetes.io/target: {{ .Values.targetIP | quote }}
    # Istio auto-provisions the gateway data plane (Deployment + Service) for this
    # Gateway. Force the generated Service to ClusterIP so it does not sit in a
    # permanently-pending LoadBalancer state on bare metal — the node IP is wired
    # up separately by the gateway-external Service (see gateway-service.yaml).
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
{{- range .Values.gateway.listeners }}
    - name: {{ .name }}
      port: {{ .port }}
      protocol: {{ .protocol }}
      allowedRoutes:
{{- toYaml .allowedRoutes | nindent 8 }}
{{- if .tls }}
      tls:
{{- toYaml .tls | nindent 8 }}
{{- end }}
{{- end }}
{{- range .Values.gateway.extraListeners }}
    - name: {{ .name }}
      port: {{ .port }}
      protocol: {{ .protocol }}
      allowedRoutes:
{{- toYaml .allowedRoutes | nindent 8 }}
{{- end }}
