{{- if .Values.serviceMonitors.operator.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: easy-deploy-operator
  namespace: easy-deploy-system
  labels:
    app.kubernetes.io/name: easy-deploy-operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: easy-deploy-operator
  namespaceSelector:
    matchNames: [easy-deploy-system]
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.scrapeInterval }}
{{- end }}
