{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
{{- $name := trimSuffix ".json" (base $path) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-{{ $name }}-dashboard
  namespace: {{ $.Values.namespace }}
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: {{ $name }}-dashboard
data:
  {{ $name }}.json: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
