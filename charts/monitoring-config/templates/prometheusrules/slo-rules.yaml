{{- if .Values.slo.enabled }}
{{- /*
  Sloth-style SLOs for every service in the mesh, discovered from Istio
  telemetry rather than declared per service.

  Nothing here is per-app: the group-by is what makes an SLO. Grouping
  istio_requests_total by (namespace, canonical_service) yields one SLO per
  service; adding destination_workload yields one per instance. So a new app
  deployed through BasePlate-Dev gets availability and latency SLOs the moment
  its first request is reported — no chart change, no values entry.

  See templates/_helpers.tpl for the rule shape and why it matches sloth.dev.
*/ -}}
{{- $sel := .Values.slo.selector -}}
{{- $svcBy := "destination_workload_namespace, destination_canonical_service" -}}
{{- $instBy := "destination_workload_namespace, destination_canonical_service, destination_workload" -}}
{{- /*
  le is a string label, and the two data planes render the same boundary
  differently: a sidecar reports le="500", a waypoint reports le="500.0". An
  equality matcher therefore silently picks one and misses the other. Match both
  renderings instead, so thresholdMs stays a plain number in values.yaml.

  A service is served by one data plane, so only one rendering exists per
  group-by — the sum cannot pick up the same bucket twice.
*/ -}}
{{- $le := printf "%v(\\.0+)?" .Values.slo.latency.thresholdMs -}}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sloth-slo-rules
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: sloth-slo-rules
    # Picked up by kube-prometheus-stack's ruleSelector alongside the other rules.
    app.kubernetes.io/component: slo
spec:
  groups:
{{- $levels := list (dict "level" "service" "by" $svcBy) -}}
{{- if .Values.slo.instanceLevel.enabled -}}
{{- $levels = append $levels (dict "level" "instance" "by" $instBy) -}}
{{- end }}
{{- range $lvl := $levels }}
{{- if $.Values.slo.availability.enabled }}
{{- /*
  Availability SLI: the share of requests the destination answered with a 5xx.
  4xx stays out of the error count deliberately — a client sending a bad request
  is not the service failing, and counting it would let one misbehaving caller
  burn a budget the owning team cannot defend.

  The `or (total * 0)` on the error side is not cosmetic. A service that has
  never returned a 5xx has no response_code=~"5.." series at all, so the
  numerator would be an empty vector, the division would match nothing, and the
  healthiest services in the mesh would silently have no SLO. Or-ing in the
  total's label set multiplied by zero mints the missing "zero errors" element.
*/ -}}
{{- include "monitoring-config.sloth.ruleGroup" (dict
      "level" $lvl.level
      "by" $lvl.by
      "slo" "availability"
      "objective" $.Values.slo.availability.objective
      "period" $.Values.slo.period
      "alerts" $.Values.slo.alerts
      "errorExpr" (printf "sum by (%s) (rate(istio_requests_total{%s, response_code=~\"5..\"}[WINDOW])) or (sum by (%s) (rate(istio_requests_total{%s}[WINDOW])) * 0)" $lvl.by $sel $lvl.by $sel)
      "totalExpr" (printf "sum by (%s) (rate(istio_requests_total{%s}[WINDOW])) > 0" $lvl.by $sel)
    ) | nindent 4 }}
{{- end }}
{{- if $.Values.slo.latency.enabled }}
{{- /*
  Latency SLI: the share of requests slower than the threshold, read off the
  histogram as (all requests - requests within the bucket). thresholdMs must be
  an existing le bucket boundary of istio_request_duration_milliseconds —
  Prometheus does not interpolate. Istio's boundaries are
  0.5, 1, 5, 10, 25, 50, 100, 250, 500, 1000, 2500, 5000, 10000 and up.

  An unmatched boundary does NOT read as 100% error, which is what makes it so
  easy to misdiagnose: the subtraction is an inner join, so an empty right side
  collapses the whole expression to an empty vector. The rule then records
  nothing at all, no group appears under sloth_slo="latency", and every latency
  panel reads "No data" while the availability half of the same dashboard keeps
  working. Confirm a boundary exists with
  `count by (le) (istio_request_duration_milliseconds_bucket)` before changing
  thresholdMs — and read the value literally, since $le above exists precisely
  because the two data planes spell the same boundary differently.

  No `or` guard is needed on the error side: both le matchers hit the same
  histogram, so once the boundary matches, the subtraction always yields an
  element — zero when nothing was slow — rather than an empty vector.
*/ -}}
{{- include "monitoring-config.sloth.ruleGroup" (dict
      "level" $lvl.level
      "by" $lvl.by
      "slo" "latency"
      "objective" $.Values.slo.latency.objective
      "period" $.Values.slo.period
      "alerts" $.Values.slo.alerts
      "errorExpr" (printf "sum by (%s) (rate(istio_request_duration_milliseconds_bucket{%s, le=\"+Inf\"}[WINDOW])) - sum by (%s) (rate(istio_request_duration_milliseconds_bucket{%s, le=~\"%s\"}[WINDOW]))" $lvl.by $sel $lvl.by $sel $le)
      "totalExpr" (printf "sum by (%s) (rate(istio_request_duration_milliseconds_bucket{%s, le=\"+Inf\"}[WINDOW])) > 0" $lvl.by $sel)
    ) | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
