namespace: monitoring

gateway:
  name: main-gateway
  namespace: nginx-gateway

grafana:
  route:
    name: grafana-route
    sections:
      - http
      - https
  backendService: monitoring-grafana
  backendPort: 80

operator:
  namespace: easy-deploy-system
  labelName: easy-deploy-operator

targetIP: ""
grafanaHostname: ""

scrapeInterval: 30s

alerts:
  enabled: true
  operatorDown:
    for: 5m
    severity: critical
  reconcileErrorsHigh:
    threshold: 0.1
    for: 10m
    severity: warning
  reconcileSlowP95:
    threshold: 5
    for: 10m
    severity: warning
  buildFailures:
    for: 5m
    severity: warning

# extraAlertRules:
#   - alert: MyCustomAlert
#     expr: some_metric > 100
#     for: 5m
#     labels:
#       severity: warning
#     annotations:
#       summary: "Custom alert fired"
extraAlertRules: []

dashboards:
  operatorMetrics:
    enabled: true
    refreshInterval: 30s
  birservice:
    enabled: true
    refreshInterval: 30s

# extraDashboards:
#   my-dashboard:
#     json: |
#       { "title": "My Dashboard", ... }
extraDashboards: {}

serviceMonitors:
  operator:
    enabled: true
  calico:
    enabled: true
  istiod:
    enabled: true
  envoy:
    enabled: true
  kiali:
    enabled: true
  jaeger:
    enabled: true

# extraServiceMonitors:
#   - name: my-app
#     namespace: my-namespace
#     selector:
#       matchLabels:
#         app: my-app
#     endpoints:
#       - port: metrics
#         path: /metrics
extraServiceMonitors: []
