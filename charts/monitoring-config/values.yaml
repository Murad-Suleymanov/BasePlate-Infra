namespace: monitoring

gateway:
  name: main-gateway
  namespace: nginx-gateway

grafana:
  route:
    name: grafana-route
    sections:
      - http
      - https
  backendService: monitoring-grafana
  backendPort: 80

operator:
  namespace: easy-deploy-system
  labelName: easy-deploy-operator

targetIP: ""
grafanaHostname: ""

scrapeInterval: 30s

alerts:
  enabled: true
  operatorDown:
    for: 5m
    severity: critical
  reconcileErrorsHigh:
    threshold: 0.1
    for: 10m
    severity: warning
  reconcileSlowP95:
    threshold: 5
    for: 10m
    severity: warning
  buildFailures:
    for: 5m
    severity: warning

# extraAlertRules:
#   - alert: MyCustomAlert
#     expr: some_metric > 100
#     for: 5m
#     labels:
#       severity: warning
#     annotations:
#       summary: "Custom alert fired"
extraAlertRules: []

dashboards:
  operatorMetrics:
    enabled: true
    refreshInterval: 30s
  birservice:
    enabled: true
    refreshInterval: 30s

# New dashboards: drop pure Grafana JSON into charts/monitoring-config/dashboards/
# Auto-discovered and deployed as ConfigMaps. No config needed.
#
# Extra dashboards from values (for environment-specific dashboards):
# extraDashboards:
#   my-dashboard:
#     json: |
#       { "title": "My Dashboard", ... }
extraDashboards: {}

serviceMonitors:
  operator:
    enabled: true
  calico:
    enabled: true
  istiod:
    enabled: true
  envoy:
    enabled: true
  kiali:
    enabled: true
  jaeger:
    enabled: true
  # Ambient data plane. The waypoint PodMonitor is what feeds the SLO rules —
  # istio_requests_total exists only where a waypoint is scraped.
  ztunnel:
    enabled: true
  waypoint:
    enabled: true

# extraServiceMonitors:
#   - name: my-app
#     namespace: my-namespace
#     selector:
#       matchLabels:
#         app: my-app
#     endpoints:
#       - port: metrics
#         path: /metrics
extraServiceMonitors: []

# Worker-saturation autoscaling (HPA scaleType: worker).
# A single recording rule normalizes each runtime's busy/max worker gauges into
# one per-pod utilization % series, app_worker_utilization (0-100). The operator's
# worker HPA reads only that series, so it is language-agnostic. Add a runtime by
# appending a {name, busy, max} entry — nothing else changes.
#
# busy = currently-working units; max = pool capacity. The rule computes
# 100 * busy / max per pod. Each app must expose its runtime's metrics (via
# spec.metrics ServiceMonitor) for its pods to be scalable on workers.
workerScaling:
  enabled: true
  sources:
    # A pod only produces a series for the runtime whose metrics it actually
    # exposes (sum of a non-existent metric is empty, so that `or` branch yields
    # nothing). Enabling all runtimes here is therefore safe: each app activates
    # worker scaling once it serves the matching busy/max gauges at /metrics
    # (spec.metrics). Adjust the names below to whatever each app really exports.
    #
    # PHP-FPM (php-fpm_exporter). With static pm, total_processes == pm.max_children,
    # so active/total is true utilization.
    - name: php-fpm
      busy: phpfpm_active_processes
      max: phpfpm_total_processes
    # Java thread pool (micrometer / Spring Boot Actuator) — exposes both busy and max.
    - name: java
      busy: executor_active_threads
      max: executor_pool_max_threads
    # Python/gunicorn (gunicorn statsd/prometheus exporter). Sync workers only —
    # async (uvicorn) has no fixed pool, so scale those on rps/cpu instead.
    - name: gunicorn
      busy: gunicorn_workers{state="busy"}
      max: gunicorn_workers
    # Ruby/puma.
    - name: puma
      busy: puma_busy_threads
      max: puma_max_threads

# Sloth-style SLOs, generated from Istio telemetry.
#
# Rather than declaring an SLO per service, the rules group istio_requests_total
# by service (and optionally by instance), so every app deployed through
# BasePlate-Dev is covered from its first request with no config here. The
# emitted series use sloth.dev's exact metric names and its multiwindow
# multi-burn-rate alert windows — see charts/monitoring-config/templates/_helpers.tpl.
slo:
  enabled: true

  # Error-budget period. The 30d SLI is averaged from the recorded 5m series
  # rather than ranged over the raw counter, so a long period stays cheap.
  period: 30d

  # Label selector applied to every SLI query. The point is to count each request
  # exactly once — without it, a request between two meshed pods is reported twice
  # (once by the caller, once by the callee) and every ratio is computed over
  # inflated totals.
  #
  # Which reporter does that depends on the data plane, and this mesh runs both
  # shapes, so both values are accepted:
  #   waypoint    — ambient. HTTP metrics come ONLY from waypoint proxies; ztunnel
  #                 emits TCP metrics (istio_tcp_*) and no istio_requests_total at
  #                 all. A waypoint-fronted request is reported once, by the
  #                 waypoint, and never also as reporter="destination".
  #   destination — sidecar workloads, reported at the receiving proxy.
  # The two never both fire for the same request, so the union stays once-per-request.
  #
  # Consequence worth knowing: in ambient, a service with no waypoint produces no
  # HTTP metrics, so it gets no SLO. Give it a waypoint to bring it under SLO.
  #
  # Add exclusions here to keep infra chatter out of app SLOs, e.g.:
  #   selector: 'reporter=~"waypoint|destination", destination_workload_namespace!~"istio-system|monitoring"'
  selector: 'reporter=~"waypoint|destination"'

  # Per-instance SLOs alongside the per-service ones. Costs one extra series set
  # per pod, and is what makes a bad instance inside a healthy pool visible —
  # the pool-level SLI averages it away.
  instanceLevel:
    enabled: true

  availability:
    enabled: true
    # Share of requests that must not be 5xx. 99.9% over 30d = ~43m of budget.
    objective: 99.9

  latency:
    enabled: true
    # Share of requests that must complete within thresholdMs.
    objective: 99.0
    # MUST be an existing le bucket boundary of istio_request_duration_milliseconds.
    # An unmatched value yields no series and the SLI reads as 100% error.
    thresholdMs: 500

  alerts:
    enabled: true
    # Fast burn — wake someone up.
    page:
      severity: critical
    # Slow burn — file it, fix it this week.
    ticket:
      severity: warning
