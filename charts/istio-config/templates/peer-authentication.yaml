apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-system
spec:
  mtls:
    mode: PERMISSIVE
---
{{- range .Values.injectedNamespaces }}
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: {{ . }}
spec:
  mtls:
    mode: {{ $.Values.meshConfig.mtlsMode }}
---
{{- end }}
{{- range .Values.meshConfig.metricsExceptions }}
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: allow-metrics-{{ .name }}
  namespace: {{ .namespace }}
spec:
  selector:
    matchLabels:
      {{- toYaml .selector | nindent 6 }}
  portLevelMtls:
{{- range .ports }}
    {{ . }}:
      mode: PERMISSIVE
{{- end }}
---
{{- end }}
