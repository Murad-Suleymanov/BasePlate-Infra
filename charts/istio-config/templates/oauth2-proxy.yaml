{{- if .Values.oauth2Proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-jaeger
  namespace: istio-system
  labels:
    app.kubernetes.io/name: oauth2-proxy-jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy-jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy-jaeger
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=oidc
            - --oidc-issuer-url={{ .Values.oauth2Proxy.issuerUrl }}
            - --client-id={{ .Values.oauth2Proxy.clientId }}
            - --email-domain=*
            - --upstream=http://jaeger.istio-system:16686
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://{{ .Values.jaegerHostname }}/oauth2/callback
            - --cookie-secure=true
            - --cookie-name=_jaeger_oauth2
            - --skip-provider-button=true
            - --code-challenge-method=S256
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: jaeger-client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-secrets
                  key: oauth2-proxy-cookie-secret
          ports:
            - containerPort: 4180
              name: http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 4180
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-jaeger
  namespace: istio-system
  labels:
    app.kubernetes.io/name: oauth2-proxy-jaeger
spec:
  ports:
    - port: 4180
      targetPort: 4180
      name: http
  selector:
    app.kubernetes.io/name: oauth2-proxy-jaeger
{{- end }}
