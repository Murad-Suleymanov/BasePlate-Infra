{{- if .Values.jaegerHostname }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jaeger-route
  namespace: istio-system
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.jaegerHostname }}
    external-dns.alpha.kubernetes.io/target: {{ .Values.targetIP }}
spec:
  parentRefs:
{{- range .Values.route.sections }}
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $.Values.gateway.name }}
      namespace: {{ $.Values.gateway.namespace }}
      sectionName: {{ . }}
{{- end }}
  hostnames:
    - {{ .Values.jaegerHostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: jaeger
          port: 16686
          weight: 1
{{- end }}
