targetIP: ""
registryHostname: ""
registryUIHostname: ""
registryTitle: "Easy Deploy Registry"

namespace: registry

gateway:
  name: main-gateway
  namespace: nginx-gateway

registry:
  image: registry:2
  replicas: 1
  port: 5000
  storageHostPath: /opt/registry-data
  service:
    type: NodePort
    nodePort: 30500
  auth:
    existingSecret: false
    htpasswd: ""
  # extraEnv:
  #   - name: REGISTRY_STORAGE_S3_BUCKET
  #     value: my-bucket
  extraEnv: []
  # extraVolumes:
  #   - name: my-volume
  #     emptyDir: {}
  extraVolumes: []
  # extraVolumeMounts:
  #   - name: my-volume
  #     mountPath: /data
  extraVolumeMounts: []

ui:
  image: joxit/docker-registry-ui:latest
  replicas: 1
  port: 80
  # extraEnv:
  #   - name: SHOW_CONTENT_DIGEST
  #     value: "true"
  extraEnv: []

route:
  sections:
    - http
    - https

clientSettings:
  maxSize: "0"
  timeout: "300s"

gc:
  enabled: true
  schedule: "0 3 * * 0"
  deleteUntagged: true
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  ttlSecondsAfterFinished: 86400
  # nodeSelector: {}
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
