apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-ui
  namespace: registry
  labels:
    app.kubernetes.io/name: registry-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry-ui
    spec:
      containers:
        - name: registry-ui
          image: joxit/docker-registry-ui:latest
          ports:
            - containerPort: 80
          env:
            - name: NGINX_PROXY_PASS_URL
              value: "http://registry.registry.svc.cluster.local:5000"
            - name: REGISTRY_URL
              value: "https://{{ .Values.registryUIHostname }}"
            - name: PULL_URL
              value: "https://{{ .Values.registryHostname }}"
            - name: SINGLE_REGISTRY
              value: "true"
            - name: DELETE_IMAGES
              value: "true"
            - name: REGISTRY_TITLE
              value: {{ .Values.registryTitle | quote }}
            - name: REGISTRY_SECURED
              value: "true"
