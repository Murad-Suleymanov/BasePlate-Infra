apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-ui
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: registry-ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: registry-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry-ui
    spec:
      containers:
        - name: registry-ui
          image: {{ .Values.ui.image }}
          ports:
            - containerPort: {{ .Values.ui.port }}
          env:
            - name: NGINX_PROXY_PASS_URL
              value: "http://registry.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.registry.port }}"
            - name: REGISTRY_URL
              value: "https://{{ .Values.registryUIHostname }}"
            - name: PULL_URL
              value: "https://{{ .Values.registryHostname }}"
            - name: SINGLE_REGISTRY
              value: "true"
            - name: DELETE_IMAGES
              value: "true"
            - name: REGISTRY_TITLE
              value: {{ .Values.registryTitle | quote }}
            - name: REGISTRY_SECURED
              value: "true"
{{- range .Values.ui.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
{{- end }}
