apiVersion: v1
kind: Service
metadata:
  name: registry-ui
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: registry-ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: registry-ui
  ports:
    - port: {{ .Values.ui.port }}
      targetPort: {{ .Values.ui.port }}
      protocol: TCP
      name: http
