apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: registry-ui-route
  namespace: registry
  annotations:
    external-dns.alpha.kubernetes.io/target: {{ .Values.targetIP | quote }}
spec:
  parentRefs:
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: http
    - name: main-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - {{ .Values.registryUIHostname }}
  rules:
    - backendRefs:
        - name: registry-ui
          port: 80
