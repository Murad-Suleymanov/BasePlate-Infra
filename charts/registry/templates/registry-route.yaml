apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: registry-route
  namespace: {{ .Values.namespace }}
  annotations:
    external-dns.alpha.kubernetes.io/target: {{ .Values.targetIP | quote }}
spec:
  parentRefs:
{{- range .Values.route.sections }}
    - name: {{ $.Values.gateway.name }}
      namespace: {{ $.Values.gateway.namespace }}
      sectionName: {{ . }}
{{- end }}
  hostnames:
    - {{ .Values.registryHostname }}
  rules:
    - backendRefs:
        - name: registry
          port: {{ .Values.registry.port }}
