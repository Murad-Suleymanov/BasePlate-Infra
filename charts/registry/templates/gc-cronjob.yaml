{{- if .Values.gc.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: registry-gc
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: registry-gc
spec:
  schedule: {{ .Values.gc.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: {{ .Values.gc.successfulJobsHistoryLimit | default 3 }}
  failedJobsHistoryLimit: {{ .Values.gc.failedJobsHistoryLimit | default 3 }}
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: {{ .Values.gc.ttlSecondsAfterFinished | default 86400 }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: registry-gc
        spec:
          restartPolicy: OnFailure
          {{- if .Values.gc.nodeSelector }}
          nodeSelector:
            {{- toYaml .Values.gc.nodeSelector | nindent 12 }}
          {{- end }}
          containers:
            - name: gc
              image: {{ .Values.registry.image }}
              command:
                - /bin/registry
                - garbage-collect
                - /etc/registry/config.yml
                {{- if .Values.gc.deleteUntagged }}
                - --delete-untagged
                {{- end }}
              volumeMounts:
                - name: registry-data
                  mountPath: /var/lib/registry
                - name: gc-config
                  mountPath: /etc/registry
                  readOnly: true
              resources:
                {{- toYaml .Values.gc.resources | nindent 16 }}
          volumes:
            - name: registry-data
              hostPath:
                path: {{ .Values.registry.storageHostPath }}
                type: DirectoryOrCreate
            - name: gc-config
              configMap:
                name: registry-gc-config
{{- end }}
