{{- range $name, $cm := .Values.extraConfigMaps }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
data:
{{- range $k, $v := $cm.data }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
{{- range .Values.extraRoutes }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  annotations:
    external-dns.alpha.kubernetes.io/target: {{ $.Values.targetIP | quote }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
      namespace: {{ $.Values.gateway.namespace }}
      sectionName: https
  hostnames:
    - {{ .hostname }}
  rules:
    - backendRefs:
        - name: {{ .backendService }}
          port: {{ .backendPort }}
{{- end }}
