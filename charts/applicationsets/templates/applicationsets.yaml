{{- range $key, $appSet := .Values.applicationSets }}
{{- if $appSet.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ $appSet.name }}
  namespace: {{ $.Values.argocdNamespace }}
spec:
  goTemplate: {{ $appSet.goTemplate }}
  goTemplateOptions: {{ $appSet.goTemplateOptions | toJson }}
  generators:
    - git:
        repoURL: {{ $.Values.devRepo.repoURL }}
        revision: {{ $.Values.devRepo.targetRevision }}
        files:
          - path: {{ $appSet.filePattern | quote }}
  template:
    metadata:
      name: '{{ "{{" }} printf "%s{{ $appSet.nameSuffix }}" .path.path {{ "}}" }}'
    spec:
      project: {{ $.Values.project }}
      sources:
        - repoURL: {{ $.Values.chartRepo.repoURL }}
          targetRevision: {{ $.Values.chartRepo.targetRevision }}
          path: {{ $appSet.chartPath }}
          helm:
            releaseName: '{{ "{{" }} .path.path {{ "}}" }}'
            ignoreMissingValueFiles: true
            valueFiles:
              - '$values/{{ "{{" }} .path.path {{ "}}" }}/service.yaml'
              # Route catalog, layered. Base routes.yaml (common to every cluster) is
              # deep-merged UNDER the per-cluster routes-<env>.yaml, so an env file
              # overrides only the leaves that differ and adds cluster-only routes.
              # Both are optional (ignoreMissingValueFiles) — apps with no base file
              # keep working as before.
              - '$values/{{ "{{" }} .path.path {{ "}}" }}/routes.yaml'
              - '$values/{{ "{{" }} .path.path {{ "}}" }}/routes-{{ $.Values.environment }}.yaml'
              - '$values/{{ "{{" }} .path.path {{ "}}" }}/{{ "{{" }} .path.filename {{ "}}" }}'
        - repoURL: {{ $.Values.devRepo.repoURL }}
          targetRevision: {{ $.Values.devRepo.targetRevision }}
          ref: values
      destination:
        server: {{ $.Values.destinationServer }}
        namespace: '{{ "{{" }} .path.path {{ "}}" }}'
      ignoreDifferences:
        - group: deploy.easydeploy.io
          kind: BirService
          jsonPointers:
            - /spec/containerPort
            - /spec/imageTag
      syncPolicy:
{{- toYaml $appSet.syncPolicy | nindent 8 }}
{{- end }}
{{- end }}
