# Node tuning: raise inotify limits on every node.
#
# Controllers/operators (otel-operator, argocd-repo-server, calico, …) each create
# fsnotify (inotify) watchers. The default fs.inotify.max_user_instances is tiny
# (often 128); once exhausted, new watchers fail with "too many open files",
# crashing controllers and cascading into Unknown pods / cache-sync timeouts.
#
# This privileged DaemonSet sets the host sysctls on every node (incl. control-plane
# via the blanket toleration) and re-applies them on reboot/reschedule. fs.inotify.*
# are host-global (not namespaced), so a privileged container's sysctl -w affects
# the node kernel.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: inotify-tuner
  namespace: kube-system
  labels:
    app: inotify-tuner
spec:
  selector:
    matchLabels:
      app: inotify-tuner
  template:
    metadata:
      labels:
        app: inotify-tuner
    spec:
      # Run on all nodes, including control-plane (tolerate every taint).
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      initContainers:
        - name: set-inotify
          image: busybox:1.36
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              set -e
              sysctl -w fs.inotify.max_user_instances=8192
              sysctl -w fs.inotify.max_user_watches=1048576
              echo "inotify limits set:"
              sysctl fs.inotify.max_user_instances fs.inotify.max_user_watches
      containers:
        - name: pause
          image: busybox:1.36
          command: ["sh", "-c", "sleep infinity"]
          resources:
            requests:
              cpu: 1m
              memory: 8Mi
            limits:
              cpu: 10m
              memory: 16Mi
